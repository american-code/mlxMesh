# XcodeGen project definition for Open Inference Mesh Dashboard
# Generate with: brew install xcodegen && xcodegen generate

name: OIMDashboard
options:
  bundleIdPrefix: com.openinferencemesh
  minimumXcodeGenVersion: "2.40"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""          # paste your Apple developer team ID here
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:

  # ── iOS / iPadOS / visionOS ─────────────────────────────────────────────────
  OIMDashboard:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    # NOTE: sources are listed as bare paths, NOT as "- path: X / group: X".
    # The explicit per-source `group:` key combined with options.createIntermediateGroups
    # sends XcodeGen 2.45.x into a pathological code path that spins CPU for 10+ minutes
    # and never finishes generating. createIntermediateGroups already groups by directory,
    # so the explicit group: keys were redundant anyway. Keep this inline form.
    sources: [Shared, iOS]
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: mlxMesh
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true   # allow plain http to local Docker cluster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openinferencemesh.app
        TARGETED_DEVICE_FAMILY: "1,2,7" # iPhone=1, iPad=2, visionOS=7
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ── watchOS ─────────────────────────────────────────────────────────────────
  OIMDashboardWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources: [Shared, watchOS]
    info:
      path: watchOS/Info.plist
      properties:
        CFBundleDisplayName: mlxMesh
        WKWatchKitApp: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openinferencemesh.app.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ── tvOS ────────────────────────────────────────────────────────────────────
  OIMDashboardTV:
    type: application
    platform: tvOS
    deploymentTarget: "26.0"
    sources: [Shared, tvOS]
    info:
      path: tvOS/Info.plist
      properties:
        CFBundleDisplayName: mlxMesh
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openinferencemesh.app.tv
        # tvOS references the app icon by its Brand Assets set name, not "AppIcon".
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"

schemes:
  OIMDashboard:
    build:
      targets:
        OIMDashboard: all
    run:
      config: Debug
    test:
      config: Debug

  OIMDashboardWatch:
    build:
      targets:
        OIMDashboardWatch: all
    run:
      config: Debug

  OIMDashboardTV:
    build:
      targets:
        OIMDashboardTV: all
    run:
      config: Debug
