# XcodeGen project definition for Open Inference Mesh Dashboard
# Generate with: brew install xcodegen && xcodegen generate

name: OIMDashboard
options:
  bundleIdPrefix: com.openinferencemesh
  minimumXcodeGenVersion: "2.40"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""          # paste your Apple developer team ID here
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:

  # ── iOS / iPadOS / visionOS ─────────────────────────────────────────────────
  OIMDashboard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
        group: Shared
      - path: iOS
        group: iOS
    info:
      path: iOS/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true   # allow plain http to local Docker cluster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openinferencemesh.app
        TARGETED_DEVICE_FAMILY: "1,2,7" # iPhone=1, iPad=2, visionOS=7
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ── watchOS ─────────────────────────────────────────────────────────────────
  OIMDashboardWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Shared
        group: Shared
      - path: watchOS
        group: watchOS
    info:
      path: watchOS/Info.plist
      properties:
        WKWatchKitApp: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openinferencemesh.app.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ── tvOS ────────────────────────────────────────────────────────────────────
  OIMDashboardTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
        group: Shared
      - path: tvOS
        group: tvOS
    info:
      path: tvOS/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openinferencemesh.app.tv
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  OIMDashboard:
    build:
      targets:
        OIMDashboard: all
    run:
      config: Debug
    test:
      config: Debug

  OIMDashboardWatch:
    build:
      targets:
        OIMDashboardWatch: all
    run:
      config: Debug

  OIMDashboardTV:
    build:
      targets:
        OIMDashboardTV: all
    run:
      config: Debug
